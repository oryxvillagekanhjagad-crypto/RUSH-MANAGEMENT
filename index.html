<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Form Styles */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Button Styles */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #f57c00;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-info {
            background: #2196f3;
            color: white;
        }

        .btn-info:hover {
            background: #0b7dda;
        }

        /* Mode Buttons */
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .mode-btn.active {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .mode-wait.active {
            background: #ff9800;
            box-shadow: 0 0 0 3px #ff9800, 0 0 0 6px rgba(255,152,0,0.3);
        }

        .mode-ready.active {
            background: #4caf50;
            box-shadow: 0 0 0 3px #4caf50, 0 0 0 6px rgba(76,175,80,0.3);
        }

        .mode-attempted.active {
            background: #2196f3;
            box-shadow: 0 0 0 3px #2196f3, 0 0 0 6px rgba(33,150,243,0.3);
        }

        /* Customer Cards */
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .customer-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .customer-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .customer-details {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .customer-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-wait {
            background: #fff3e0;
            color: #ff9800;
        }

        .status-ready {
            background: #e8f5e9;
            color: #4caf50;
        }

        .status-attempted {
            background: #e3f2fd;
            color: #2196f3;
        }

        .card-buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        /* Alert Box */
        .alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            max-width: 350px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            border-left-color: #4caf50;
        }

        .alert-error {
            border-left-color: #f44336;
        }

        .alert-info {
            border-left-color: #2196f3;
        }

        .alert-warning {
            border-left-color: #ff9800;
        }

        /* Confirm Dialog */
        .confirm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease-out;
        }

        .confirm-dialog {
            background: white;
            border-radius: 15px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .confirm-dialog h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .confirm-dialog p {
            margin-bottom: 20px;
            color: #666;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 Customer Management System</h1>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total Customers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="waitCount">0</div>
                    <div class="stat-label">Waiting</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="readyCount">0</div>
                    <div class="stat-label">Ready</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="attemptedCount">0</div>
                    <div class="stat-label">Attempted</div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Add New Customer</h3>
            <div class="form-group">
                <label>Customer Name *</label>
                <input type="text" id="customerName" placeholder="Enter customer name">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="customerPhone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Address *</label>
                <input type="text" id="customerAddress" placeholder="Enter address">
            </div>
            <div class="form-group">
                <label>Assign to Captain (Optional)</label>
                <input type="text" id="assignedCaptain" placeholder="Enter captain name (optional)">
            </div>
            <button class="btn btn-primary" onclick="addCustomer()">➕ Add Customer</button>
        </div>

        <div class="mode-buttons">
            <button class="btn btn-warning mode-btn mode-wait" onclick="filterByMode('wait')">⏳ WAIT MODE</button>
            <button class="btn btn-success mode-btn mode-ready" onclick="filterByMode('ready')">✅ READY MODE</button>
            <button class="btn btn-info mode-btn mode-attempted" onclick="filterByMode('attempted')">📞 ATTEMPTED MODE</button>
        </div>

        <div id="customersContainer" class="customers-grid"></div>
    </div>

    <script>
        let customers = [];
        let currentFilter = 'all';
        let nextId = 1;

        // Load customers from localStorage
        function loadCustomers() {
            const stored = localStorage.getItem('customers');
            if (stored) {
                customers = JSON.parse(stored);
                nextId = Math.max(...customers.map(c => c.id), 0) + 1;
                updateStats();
                renderCustomers();
            }
        }

        // Save to localStorage
        function saveCustomers() {
            localStorage.setItem('customers', JSON.stringify(customers));
            updateStats();
        }

        // Show alert box
        function showAlert(message, type = 'info') {
            const alertBox = document.createElement('div');
            alertBox.className = `alert-box alert-${type}`;
            alertBox.innerHTML = `
                <strong>${type.toUpperCase()}</strong>
                <p style="margin-top: 5px;">${message}</p>
            `;
            document.body.appendChild(alertBox);
            
            setTimeout(() => {
                alertBox.remove();
            }, 3000);
        }

        // Show confirm dialog
        function showConfirm(message, onConfirm, onCancel) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-dialog">
                    <h3>Confirm Action</h3>
                    <p>${message}</p>
                    <div class="confirm-buttons">
                        <button class="btn btn-danger" id="confirmCancel">Cancel</button>
                        <button class="btn btn-success" id="confirmOk">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            document.getElementById('confirmOk').onclick = () => {
                onConfirm();
                overlay.remove();
            };
            
            document.getElementById('confirmCancel').onclick = () => {
                if (onCancel) onCancel();
                overlay.remove();
            };
        }

        // Add customer
        function addCustomer() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            const assignedCaptain = document.getElementById('assignedCaptain').value.trim();
            
            if (!name || !phone || !address) {
                showAlert('Please fill all required fields!', 'error');
                return;
            }
            
            const newCustomer = {
                id: nextId++,
                name: name,
                phone: phone,
                address: address,
                assignedCaptain: assignedCaptain || 'Not assigned',
                status: 'wait',
                createdAt: new Date().toISOString()
            };
            
            customers.unshift(newCustomer); // Add to beginning for "first added first"
            saveCustomers();
            renderCustomers();
            
            // Clear form
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('assignedCaptain').value = '';
            
            showAlert(`Customer ${name} added successfully!`, 'success');
        }

        // Update status with confirm
        function updateStatus(customerId, newStatus) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return;
            
            const statusNames = { wait: 'Waiting', ready: 'Ready', attempted: 'Attempted' };
            
            showConfirm(
                `Are you sure you want to change ${customer.name}'s status to ${statusNames[newStatus]}?`,
                () => {
                    customer.status = newStatus;
                    saveCustomers();
                    renderCustomers();
                    showAlert(`${customer.name} status updated to ${statusNames[newStatus]}!`, 'success');
                }
            );
        }

        // Delete customer with confirm
        function deleteCustomer(customerId) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return;
            
            showConfirm(
                `Are you sure you want to delete ${customer.name}?`,
                () => {
                    customers = customers.filter(c => c.id !== customerId);
                    saveCustomers();
                    renderCustomers();
                    showAlert(`${customer.name} has been deleted!`, 'success');
                }
            );
        }

        // Filter by mode
        function filterByMode(mode) {
            currentFilter = mode;
            
            // Remove active class from all mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to clicked button
            if (mode === 'wait') {
                document.querySelector('.mode-wait').classList.add('active');
                showAlert('Showing all customers in WAITING mode', 'info');
            } else if (mode === 'ready') {
                document.querySelector('.mode-ready').classList.add('active');
                showAlert('Showing all customers in READY mode', 'info');
            } else if (mode === 'attempted') {
                document.querySelector('.mode-attempted').classList.add('active');
                showAlert('Showing all customers in ATTEMPTED mode', 'info');
            }
            
            renderCustomers();
        }

        // Get filtered customers
        function getFilteredCustomers() {
            if (currentFilter === 'all') {
                return customers;
            }
            return customers.filter(c => c.status === currentFilter);
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalCount').textContent = customers.length;
            document.getElementById('waitCount').textContent = customers.filter(c => c.status === 'wait').length;
            document.getElementById('readyCount').textContent = customers.filter(c => c.status === 'ready').length;
            document.getElementById('attemptedCount').textContent = customers.filter(c => c.status === 'attempted').length;
        }

        // Render customers
        function renderCustomers() {
            const container = document.getElementById('customersContainer');
            const filtered = getFilteredCustomers();
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 50px; background: white; border-radius: 15px;">No customers found in this category</div>';
                return;
            }
            
            container.innerHTML = filtered.map(customer => `
                <div class="customer-card">
                    <div class="customer-name">${escapeHtml(customer.name)}</div>
                    <div class="customer-details">📞 ${escapeHtml(customer.phone)}</div>
                    <div class="customer-details">📍 ${escapeHtml(customer.address)}</div>
                    <div class="customer-details">🚕 Captain: ${escapeHtml(customer.assignedCaptain)}</div>
                    <div class="customer-details">🆔 ID: ${customer.id}</div>
                    <div class="customer-details">📅 Added: ${new Date(customer.createdAt).toLocaleDateString()}</div>
                    <div>
                        <span class="customer-status status-${customer.status}">
                            ${customer.status === 'wait' ? '⏳ Waiting' : customer.status === 'ready' ? '✅ Ready' : '📞 Attempted'}
                        </span>
                    </div>
                    <div class="card-buttons">
                        ${customer.status !== 'wait' ? `<button class="btn btn-warning" onclick="updateStatus(${customer.id}, 'wait')">⏳ Set Wait</button>` : ''}
                        ${customer.status !== 'ready' ? `<button class="btn btn-success" onclick="updateStatus(${customer.id}, 'ready')">✅ Set Ready</button>` : ''}
                        ${customer.status !== 'attempted' ? `<button class="btn btn-info" onclick="updateStatus(${customer.id}, 'attempted')">📞 Set Attempted</button>` : ''}
                        <button class="btn btn-danger" onclick="deleteCustomer(${customer.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadCustomers();
        
        // Set default active state for all mode (show all customers initially)
        // No mode button is active by default, showing all customers
        renderCustomers();
    </script>
</body>
</html>
