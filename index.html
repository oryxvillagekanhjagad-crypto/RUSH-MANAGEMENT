<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>Customer Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 12px;
            font-size: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Header */
        .header {
            background: #2d2d2d;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            flex: 1;
        }

        /* Stats - Mobile Friendly Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 0;
        }

        .stat-card {
            background: #3d3d3d;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #4d4d4d;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
        }

        .stat-label {
            color: #b0b0b0;
            margin-top: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        /* Form Section */
        .form-section {
            background: #2d2d2d;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .form-section h3 {
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #d0d0d0;
            font-weight: 700;
            font-size: 13px;
        }

        label .required {
            color: #ff6b6b;
        }

        label .optional {
            color: #888888;
            font-weight: normal;
            font-size: 11px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #4d4d4d;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            background: #3d3d3d;
            color: #ffffff;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #888888;
            box-shadow: 0 0 0 3px rgba(136,136,136,0.2);
        }

        input::placeholder {
            color: #888888;
            font-weight: 400;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            transition: all 0.2s;
            margin: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #8b0000;
            color: white;
            border: 1px solid #5c0000;
            font-size: 16px;
            padding: 16px;
            width: 100%;
            margin-top: 8px;
        }

        .btn-primary:active {
            background: #6b0000;
        }

        .btn-warning {
            background: #fd7e14;
            color: white;
        }

        .btn-success {
            background: #2fb344;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-outline {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-bin {
            background: #1a1a1a;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            font-size: 14px;
            padding: 10px 16px;
        }

        /* Mode Buttons - Mobile Optimized */
        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            padding: 12px 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .mode-btn.active {
            transform: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .mode-wait.active {
            background: #fd7e14;
        }

        .mode-ready.active {
            background: #2fb344;
        }

        .mode-attempted.active {
            background: #dc3545;
        }

        /* Customer Cards - Mobile Optimized */
        .customers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
        }

        .customer-card {
            border-radius: 16px;
            padding: 16px;
            transition: all 0.2s;
            color: white;
        }

        .customer-card:active {
            transform: scale(0.99);
        }

        .customer-card.status-wait {
            background: #cc7000;
            border-left: 5px solid #ffaa44;
        }

        .customer-card.status-ready {
            background: #1e8a3a;
            border-left: 5px solid #55ff88;
        }

        .customer-card.status-attempted {
            background: #b02a37;
            border-left: 5px solid #ff6666;
        }

        .customer-name {
            font-size: 20px;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
            word-break: break-word;
        }

        .customer-details {
            color: rgba(255,255,255,0.95);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .customer-details-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }

        .customer-details-row .detail-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 14px;
            font-weight: 700;
        }

        .customer-details strong, .customer-details-row strong {
            color: white;
            font-weight: 800;
            min-width: 70px;
            font-size: 14px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 20px;
            font-weight: 800;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .customer-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .card-buttons {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            border-top: 2px solid rgba(255,255,255,0.2);
            padding-top: 16px;
        }

        .card-buttons .btn {
            font-weight: 800;
            font-size: 12px;
            padding: 10px 8px;
            margin: 0;
            text-align: center;
        }

        /* Alert Box - Mobile Optimized */
        .alert-box {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            background: #2d2d2d;
            border-left: 4px solid;
            padding: 14px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Dialog - Mobile Optimized */
        .confirm-overlay, .prompt-overlay, .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 16px;
        }

        .confirm-dialog, .prompt-dialog, .password-dialog {
            background: #2d2d2d;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .confirm-dialog h3, .prompt-dialog h3, .password-dialog h3 {
            margin-bottom: 12px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
        }

        .confirm-dialog p, .prompt-dialog p, .password-dialog p {
            margin-bottom: 20px;
            color: #b0b0b0;
            font-size: 15px;
            font-weight: 500;
        }

        .password-dialog input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #4d4d4d;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            background: #3d3d3d;
            color: white;
        }

        .confirm-buttons, .prompt-buttons, .password-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Scroll behavior */
        html {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Better touch targets */
        button, .btn {
            min-height: 44px;
        }

        input {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-row">
                <h1>CUSTOMER<br>MANAGEMENT</h1>
                <button class="btn btn-bin" onclick="showBinDialog()">🗑️ BIN</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">TOTAL</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="waitCount">0</div>
                    <div class="stat-label">WAIT</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="readyCount">0</div>
                    <div class="stat-label">READY</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="attemptedCount">0</div>
                    <div class="stat-label">ATMPT</div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>ADD NEW CUSTOMER</h3>
            <div class="form-group">
                <label>CUSTOMER NAME <span class="required">*</span></label>
                <input type="text" id="customerName" placeholder="Enter customer name">
            </div>
            <div class="form-group">
                <label>NUMBER OF PEOPLE <span class="required">*</span></label>
                <input type="number" id="numberOfPeoples" placeholder="Number of people" min="1">
            </div>
            <div class="form-group">
                <label>PHONE NUMBER <span class="optional">(OPTIONAL)</span></label>
                <input type="tel" id="customerPhone" placeholder="Enter phone number">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>TIME <span class="optional">(OPTIONAL)</span></label>
                    <input type="text" id="timeOption" placeholder="e.g., 7:30 PM">
                </div>
                <div class="form-group">
                    <label>CAPTAIN <span class="optional">(OPTIONAL)</span></label>
                    <input type="text" id="assignedCaptain" placeholder="Captain name">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addCustomer()">➕ ADD CUSTOMER</button>
        </div>

        <div class="mode-buttons">
            <button class="btn btn-warning mode-btn mode-wait" onclick="filterByMode('wait')">WAIT</button>
            <button class="btn btn-success mode-btn mode-ready" onclick="filterByMode('ready')">READY</button>
            <button class="btn btn-danger mode-btn mode-attempted" onclick="filterByMode('attempted')">ATTEMPTED</button>
        </div>

        <div id="customersContainer" class="customers-grid"></div>
    </div>

    <script>
        let customers = [];
        let currentFilter = 'all';
        let nextId = 1;
        let timerIntervals = {};

        function loadCustomers() {
            const stored = localStorage.getItem('customers');
            if (stored) {
                customers = JSON.parse(stored);
                nextId = Math.max(...customers.map(c => c.id), 0) + 1;
                updateStats();
                renderCustomers();
                startAllTimers();
            }
        }

        function saveCustomers() {
            localStorage.setItem('customers', JSON.stringify(customers));
            updateStats();
        }

        function startAllTimers() {
            customers.forEach(customer => {
                if (customer.status === 'wait' || customer.status === 'ready') {
                    startTimer(customer.id);
                }
            });
        }

        function startTimer(customerId) {
            if (timerIntervals[customerId]) {
                clearInterval(timerIntervals[customerId]);
            }
            
            timerIntervals[customerId] = setInterval(() => {
                const customer = customers.find(c => c.id === customerId);
                if (customer && (customer.status === 'wait' || customer.status === 'ready')) {
                    updateTimerDisplay(customerId);
                } else if (customer && customer.status === 'attempted') {
                    if (timerIntervals[customerId]) {
                        clearInterval(timerIntervals[customerId]);
                        delete timerIntervals[customerId];
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay(customerId) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer || !customer.activatedAt) return;
            
            const elapsed = Math.floor((Date.now() - new Date(customer.activatedAt).getTime()) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            const timerElement = document.getElementById(`timer-${customerId}`);
            if (timerElement) {
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        function showAlert(message, type = 'info') {
            const alertBox = document.createElement('div');
            alertBox.className = `alert-box alert-${type}`;
            alertBox.innerHTML = `<strong>${type.toUpperCase()}</strong><p style="margin-top: 6px; font-size: 14px;">${message}</p>`;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 3000);
        }

        function showConfirm(message, onConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-dialog">
                    <h3>⚠️ CONFIRM</h3>
                    <p>${message}</p>
                    <div class="confirm-buttons">
                        <button class="btn btn-outline" id="confirmCancel" style="font-size: 14px;">CANCEL</button>
                        <button class="btn btn-primary" id="confirmOk" style="background: #8b0000; font-size: 14px;">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            document.getElementById('confirmOk').onclick = () => {
                onConfirm();
                overlay.remove();
            };
            document.getElementById('confirmCancel').onclick = () => overlay.remove();
        }

        function showBinDialog() {
            const overlay = document.createElement('div');
            overlay.className = 'password-overlay';
            overlay.innerHTML = `
                <div class="password-dialog">
                    <h3>🗑️ CLEAR ALL</h3>
                    <p>Enter password to delete ALL customers. This cannot be undone!</p>
                    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
                    <div class="password-buttons">
                        <button class="btn btn-outline" id="passwordCancel">CANCEL</button>
                        <button class="btn btn-danger" id="passwordConfirm">DELETE ALL</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            const input = document.getElementById('passwordInput');
            input.focus();
            
            document.getElementById('passwordConfirm').onclick = () => {
                const password = input.value;
                if (password === '2020') {
                    showConfirm('⚠️ WARNING: This will delete ALL customers permanently! Are you sure?', () => {
                        Object.keys(timerIntervals).forEach(id => {
                            clearInterval(timerIntervals[id]);
                            delete timerIntervals[id];
                        });
                        customers = [];
                        nextId = 1;
                        saveCustomers();
                        renderCustomers();
                        showAlert('All customer data has been cleared!', 'success');
                        overlay.remove();
                    });
                } else {
                    showAlert('Incorrect password! Data not cleared.', 'error');
                    overlay.remove();
                }
            };
            document.getElementById('passwordCancel').onclick = () => overlay.remove();
            
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('passwordConfirm').click();
            });
        }

        function showTablePrompt(customer, onConfirm) {
            const overlay = document.createElement('div');
            overlay.className = 'prompt-overlay';
            overlay.innerHTML = `
                <div class="prompt-dialog">
                    <h3>🪑 ASSIGN TABLE</h3>
                    <p>Enter table name/number for ${customer.name}</p>
                    <input type="text" id="tableNameInput" placeholder="e.g., TABLE 5" autocomplete="off" style="font-size: 16px;">
                    <div class="prompt-buttons">
                        <button class="btn btn-outline" id="promptCancel">CANCEL</button>
                        <button class="btn btn-success" id="promptOk">OK</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            const input = document.getElementById('tableNameInput');
            input.focus();
            
            document.getElementById('promptOk').onclick = () => {
                const tableName = input.value.trim().toUpperCase();
                if (!tableName) {
                    showAlert('Please enter table name/number!', 'error');
                    return;
                }
                onConfirm(tableName);
                overlay.remove();
            };
            document.getElementById('promptCancel').onclick = () => overlay.remove();
            
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('promptOk').click();
            });
        }

        function addCustomer() {
            const name = document.getElementById('customerName').value.trim();
            const people = document.getElementById('numberOfPeoples').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const time = document.getElementById('timeOption').value.trim();
            const captain = document.getElementById('assignedCaptain').value.trim();
            
            if (!name || !people) {
                showAlert('Please fill: Customer Name and Number of People!', 'error');
                return;
            }
            
            const newCustomer = {
                id: nextId++,
                name: name.toUpperCase(),
                numberOfPeoples: people,
                phone: phone || 'NOT PROVIDED',
                time: time || 'NOT SPECIFIED',
                assignedCaptain: captain ? captain.toUpperCase() : 'NOT ASSIGNED',
                status: 'wait',
                tableName: null,
                activatedAt: new Date().toISOString(),
                createdAt: new Date().toISOString()
            };
            
            customers.push(newCustomer);
            saveCustomers();
            renderCustomers();
            startTimer(newCustomer.id);
            
            document.getElementById('customerName').value = '';
            document.getElementById('numberOfPeoples').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('timeOption').value = '';
            document.getElementById('assignedCaptain').value = '';
            
            showAlert(`✅ ${name} added!`, 'success');
        }

        function updateStatus(customerId, newStatus) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return;
            
            const statusNames = { wait: 'WAITING', ready: 'READY', attempted: 'ATTEMPTED' };
            
            if (customer.status === 'wait' && newStatus === 'ready') {
                showTablePrompt(customer, (tableName) => {
                    showConfirm(`Change ${customer.name} to ${statusNames[newStatus]} with ${tableName}?`, () => {
                        customer.status = newStatus;
                        customer.tableName = tableName;
                        saveCustomers();
                        renderCustomers();
                        startTimer(customer.id);
                        showAlert(`✅ ${customer.name} updated to ${statusNames[newStatus]}! Table: ${tableName}`, 'success');
                    });
                });
            } else {
                showConfirm(`Change ${customer.name} to ${statusNames[newStatus]}?`, () => {
                    customer.status = newStatus;
                    saveCustomers();
                    renderCustomers();
                    if (newStatus === 'wait' || newStatus === 'ready') {
                        startTimer(customer.id);
                    }
                    showAlert(`✅ ${customer.name} updated to ${statusNames[newStatus]}!`, 'success');
                });
            }
        }

        function makeCall(phoneNumber, customerName) {
            if (!phoneNumber || phoneNumber === 'NOT PROVIDED') {
                showAlert(`📞 No phone number for ${customerName}`, 'error');
                return;
            }
            showConfirm(`📞 Call ${customerName} at ${phoneNumber}?`, () => {
                window.location.href = `tel:${phoneNumber}`;
                showAlert(`📞 Calling ${customerName}...`, 'info');
            });
        }

        function releaseCustomer(customerId) {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return;
            
            showConfirm(`🗑️ Release ${customer.name}?`, () => {
                if (timerIntervals[customerId]) {
                    clearInterval(timerIntervals[customerId]);
                    delete timerIntervals[customerId];
                }
                customers = customers.filter(c => c.id !== customerId);
                saveCustomers();
                renderCustomers();
                showAlert(`🗑️ ${customer.name} released!`, 'success');
            });
        }

        function filterByMode(mode) {
            currentFilter = mode;
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            
            if (mode === 'wait') {
                document.querySelector('.mode-wait').classList.add('active');
                showAlert('⏳ Showing WAITING customers (oldest first)', 'info');
            } else if (mode === 'ready') {
                document.querySelector('.mode-ready').classList.add('active');
                showAlert('✅ Showing READY customers (oldest first)', 'info');
            } else if (mode === 'attempted') {
                document.querySelector('.mode-attempted').classList.add('active');
                showAlert('📞 Showing ATTEMPTED customers (oldest first)', 'info');
            }
            
            renderCustomers();
        }

        function getFilteredCustomers() {
            let filtered;
            if (currentFilter === 'all') {
                filtered = [...customers];
            } else {
                filtered = customers.filter(c => c.status === currentFilter);
            }
            filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            return filtered;
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = customers.length;
            document.getElementById('waitCount').textContent = customers.filter(c => c.status === 'wait').length;
            document.getElementById('readyCount').textContent = customers.filter(c => c.status === 'ready').length;
            document.getElementById('attemptedCount').textContent = customers.filter(c => c.status === 'attempted').length;
        }

        function getElapsedTime(activatedAt) {
            if (!activatedAt) return '00:00';
            const elapsed = Math.floor((Date.now() - new Date(activatedAt).getTime()) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function renderCustomers() {
            const container = document.getElementById('customersContainer');
            const filtered = getFilteredCustomers();
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; background: #2d2d2d; border-radius: 16px; color: #888888; font-weight: 700; font-size: 16px;">📭 NO CUSTOMERS</div>';
                return;
            }
            
            container.innerHTML = filtered.map(customer => `
                <div class="customer-card status-${customer.status}">
                    <div class="customer-name">${escapeHtml(customer.name)}</div>
                    <div class="customer-details"><strong>👥 PEOPLE:</strong> ${escapeHtml(customer.numberOfPeoples)}</div>
                    <div class="customer-details"><strong>📞 PHONE:</strong> ${escapeHtml(customer.phone)}</div>
                    <div class="customer-details-row">
                        <div class="detail-item"><strong>⏰ TIME:</strong> ${escapeHtml(customer.time)}</div>
                        <div class="detail-item"><strong>⚓ CAPTAIN:</strong> ${escapeHtml(customer.assignedCaptain)}</div>
                    </div>
                    ${customer.tableName ? `<div class="customer-details"><strong>🪑 TABLE:</strong> ${escapeHtml(customer.tableName)}</div>` : ''}
                    <div class="customer-details">
                        <strong>⏱️ TIMER:</strong> 
                        <span class="timer-display" id="timer-${customer.id}">${getElapsedTime(customer.activatedAt)}</span>
                    </div>
                    <div>
                        <span class="customer-status">
                            ${customer.status === 'wait' ? '⏳ WAITING' : customer.status === 'ready' ? '✅ READY' : '📞 ATTEMPTED'}
                        </span>
                    </div>
                    <div class="card-buttons">
                        <button class="btn btn-outline" onclick="makeCall('${escapeHtml(customer.phone)}', '${escapeHtml(customer.name)}')">📞 CALL</button>
                        ${customer.status !== 'wait' ? `<button class="btn btn-warning" onclick="updateStatus(${customer.id}, 'wait')">WAIT</button>` : ''}
                        ${customer.status !== 'ready' ? `<button class="btn btn-success" onclick="updateStatus(${customer.id}, 'ready')">READY</button>` : ''}
                        ${customer.status !== 'attempted' ? `<button class="btn btn-info" onclick="updateStatus(${customer.id}, 'attempted')">ATTEMPT</button>` : ''}
                        <button class="btn btn-danger" onclick="releaseCustomer(${customer.id})">🗑️ RELEASE</button>
                    </div>
                </div>
            `).join('');
            
            customers.forEach(customer => {
                if (customer.status === 'wait' || customer.status === 'ready') {
                    updateTimerDisplay(customer.id);
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadCustomers();
    </script>
</body>
</html>
