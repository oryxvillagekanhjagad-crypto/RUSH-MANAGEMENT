```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oryx Village Queue</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f3f3f3;
margin:0;
padding:15px;
max-width:700px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:15px;
color:#222;
}

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

.dustbin{
background:#111;
color:white;
font-size:18px;
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
}

.box,.stats{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card{
padding:15px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
transition:.2s;
border:2px solid transparent;
}

.card:hover{
transform:translateY(-2px);
}

.waiting{
background:#fff3cd;
border-color:#ff9800;
color:#7a5200;
}

.ready{
background:#d4edda;
border-color:#28a745;
color:#155724;
}

.attempted{
background:#f8d7da;
border-color:#dc3545;
color:#721c24;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
text-transform:uppercase;
}

button{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-size:14px;
margin:4px 2px;
font-weight:bold;
}

.add{
width:100%;
background:#222;
color:white;
}

.call{
background:#444;
color:white;
}

.green{
background:#28a745;
color:white;
}

.red{
background:#dc3545;
color:white;
}

.orange{
background:#ff9800;
color:white;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.stats{
display:flex;
justify-content:space-between;
text-align:center;
font-weight:bold;
font-size:14px;
}

.stats div{
flex:1;
}

.actions{
margin-top:10px;
display:flex;
flex-wrap:wrap;
}

.time{
font-weight:bold;
font-size:15px;
}

.table{
font-size:16px;
font-weight:bold;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Oryx Village Queue</h2>

<div class="topbar">

<button
class="dustbin"
onclick="clearAllCustomers()">
🗑️
</button>

</div>

<div class="stats">

<div>
TOTAL<br>
<span id="total">0</span>
</div>

<div>
WAITING<br>
<span id="waitingCount">0</span>
</div>

<div>
READY<br>
<span id="readyCount">0</span>
</div>

<div>
ATTEMPTED<br>
<span id="attemptedCount">0</span>
</div>

</div>

<div class="box">

<input
id="search"
placeholder="SEARCH NAME OR PHONE"
onkeyup="render()">

</div>

<div class="box">

<input
id="name"
placeholder="CUSTOMER NAME"
oninput="
this.value =
this.value.toUpperCase()
">

<input
id="people"
type="number"
placeholder="HOW MANY PEOPLE">

<input
id="time"
placeholder="TIME OPTIONAL"
oninput="
this.value =
this.value.toUpperCase()
">

<input
id="phone"
type="tel"
maxlength="10"
placeholder="PHONE NUMBER">

<button
class="add"
onclick="addCustomer()">
ADD CUSTOMER
</button>

</div>

<div id="list"></div>

<script>

let customers =
JSON.parse(
localStorage.getItem('oryxQueue')
) || [];

/* AUTO REMOVE OLD CUSTOMERS */

customers =
customers.filter(c => {

let ageHours =
(Date.now() - c.added)
/
(1000*60*60);

return ageHours < 24;

});

saveData();

function saveData(){

localStorage.setItem(
'oryxQueue',
JSON.stringify(customers)
);

}

function addCustomer(){

let name =
document.getElementById('name')
.value
.trim()
.toUpperCase();

let people =
document.getElementById('people')
.value;

let time =
document.getElementById('time')
.value
.trim()
.toUpperCase();

let phone =
document.getElementById('phone')
.value.trim();

if(name===''){

alert(
'CUSTOMER NAME IS REQUIRED'
);

return;

}

if(
people==='' ||
Number(people)<=0
){

alert(
'ENTER VALID NUMBER OF PEOPLE'
);

return;

}

if(
phone!='' &&
!/^\d{10}$/.test(phone)
){

alert(
'PHONE NUMBER MUST BE 10 DIGITS'
);

return;

}

customers.push({

name,
people,
time,
phone,
status:'waiting',
table:'',
added:Date.now(),
readyTime:null

});

saveData();

document.getElementById('name').value='';
document.getElementById('people').value='';
document.getElementById('time').value='';
document.getElementById('phone').value='';

render();

}

function render(){

let search =
document.getElementById('search')
.value
.toLowerCase()
.trim();

let html='';

let sortedCustomers =
[...customers].sort((a,b)=>{

const order = {

waiting:0,
ready:1,
attempted:2

};

if(
order[a.status] !==
order[b.status]
){

return (
order[a.status] -
order[b.status]
);

}

/* FIFO */

return a.added - b.added;

});

sortedCustomers.forEach(function(c){

let originalIndex =
customers.indexOf(c);

let name =
(c.name || '')
.toLowerCase();

let phone =
(c.phone || '');

if(
search &&
!name.includes(search) &&
!phone.includes(search)
){
return;
}

let status='🟠 WAITING';
let cls='waiting';

if(c.status==='ready'){

status='🟢 READY';
cls='ready';

}

if(c.status==='attempted'){

status='🔴 ATTEMPTED';
cls='attempted';

}

let mins =
Math.floor(
(Date.now()-c.added)
/60000
);

/* AGE COLOR EFFECT */

let opacity = 0.10;

if(mins > 30){
opacity = 0.20;
}

if(mins > 60){
opacity = 0.35;
}

if(mins > 120){
opacity = 0.50;
}

html += `

<div
class="card ${cls}"
style="
box-shadow:
0 0 0 9999px
rgba(0,0,0,${opacity})
inset;
">

<div class="name">
${c.name}
</div>

<p>${status}</p>

<p>
PEOPLE:
<b>${c.people}</b>
</p>

<p>
TIME:
<b>${c.time || '-'}</b>
</p>

<p>
PHONE:
<b>${c.phone || '-'}</b>
</p>

${c.table ?

`<p class="table">
🍽️ TABLE:
<b>${c.table}</b>
</p>`

:''}

<p class="time">
WAITING TIME:
${mins} MINS
</p>

<div class="actions">

${c.phone ?

`<button
class="call"
onclick="callCustomer('${c.phone}')">
📞 CALL
</button>`

:''}

<button
class="green"
onclick="setReady(${originalIndex})">
READY
</button>

<button
class="red"
onclick="setAttempted(${originalIndex})">
ATTEMPTED
</button>

<button
class="orange"
onclick="releaseCustomer(${originalIndex})">
RELEASE
</button>

</div>

</div>

`;

});

document.getElementById('list')
.innerHTML=html;

document.getElementById('total')
.innerText=customers.length;

document.getElementById('waitingCount')
.innerText=
customers.filter(
x=>x.status==='waiting'
).length;

document.getElementById('readyCount')
.innerText=
customers.filter(
x=>x.status==='ready'
).length;

document.getElementById('attemptedCount')
.innerText=
customers.filter(
x=>x.status==='attempted'
).length;

}

function setReady(i){

let table =
prompt(
'ENTER TABLE NAME / NUMBER'
);

if(
table===null ||
table.trim()===''
){

alert(
'TABLE NAME REQUIRED'
);

return;

}

table =
table
.trim()
.toUpperCase();

customers[i].table =
table;

customers[i].status='ready';

if(
!customers[i].readyTime
){

customers[i].readyTime=
Date.now();

}

saveData();

render();

}

function setAttempted(i){

customers[i].status='attempted';

saveData();

render();

}

function releaseCustomer(i){

if(
confirm(
'RELEASE CUSTOMER?'
)
){

customers.splice(i,1);

saveData();

render();

}

}

function clearAllCustomers(){

let pass =
prompt(
'ENTER PASSWORD'
);

if(pass!=='2020'){

alert(
'WRONG PASSWORD'
);

return;

}

if(
confirm(
'DELETE ALL CUSTOMERS?'
)
){

customers=[];

saveData();

render();

}

}

function callCustomer(phone){

if(
phone &&
/^\d{10}$/.test(phone)
){

window.location.href =
'tel:' + phone;

}else{

alert(
'VALID PHONE NUMBER NOT FOUND'
);

}

}

render();

setInterval(
render,
60000
);

</script>

</body>
</html>
```
